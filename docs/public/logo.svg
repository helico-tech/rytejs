<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Workflow icon scaled up and centered -->
  <g transform="translate(40, 38) scale(1.3)">
    <!-- Flow paths -->
    <path d="M 22 22 L 60 22 Q 76 22 76 38 L 76 62 Q 76 78 92 78 L 108 78" fill="none" stroke="#A5B4FC" stroke-width="3" stroke-linecap="round"/>
    <path d="M 22 22 L 60 22 Q 76 22 76 38 L 76 100 Q 76 116 92 116 L 108 116" fill="none" stroke="#A5B4FC" stroke-width="3" stroke-linecap="round"/>
    <path d="M 22 78 L 42 78" fill="none" stroke="#A5B4FC" stroke-width="3" stroke-linecap="round"/>
    <path d="M 22 116 L 42 116" fill="none" stroke="#A5B4FC" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 3.5" opacity="0.4"/>

    <!-- Node: Start -->
    <circle cx="14" cy="22" r="12" fill="#818CF8"/>
    <circle cx="14" cy="22" r="5" fill="#1E1B4B"/>

    <!-- Node: Validated step (with checkmark) -->
    <rect x="104" y="64" width="28" height="28" rx="7" fill="#818CF8"/>
    <path d="M 112 78 L 117 83 L 126 72" fill="none" stroke="#1E1B4B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Node: Queued step -->
    <rect x="104" y="102" width="28" height="28" rx="7" fill="#A5B4FC" opacity="0.4"/>

    <!-- Node: Parallel input -->
    <circle cx="14" cy="78" r="10" fill="#818CF8" opacity="0.7"/>

    <!-- Node: Pending -->
    <circle cx="14" cy="116" r="10" fill="none" stroke="#A5B4FC" stroke-width="2" stroke-dasharray="4 3" opacity="0.4"/>

    <!-- Outgoing arrow -->
    <line x1="132" y1="78" x2="148" y2="78" stroke="#A5B4FC" stroke-width="3" stroke-linecap="round"/>
    <polygon points="147,72 158,78 147,84" fill="#A5B4FC"/>
  </g>
</svg>
